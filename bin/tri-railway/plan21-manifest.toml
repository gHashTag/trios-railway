# plan-21 minimum-viable manifest for `tri railway plan9 deploy`.
#
# Parent tracker: https://github.com/gHashTag/trios-railway/issues/43
# Race:           https://github.com/gHashTag/trios/issues/143
# Anchor:         phi^2 + phi^-2 = 3

version = "plan-21 / 2026-04-27T19:25Z"
anchor  = "phi^2 + phi^-2 = 3"

# Hard drift rules consumed by the watchdog (sibling readers).
[drift_rules]
missing_seed                 = "warn"
extra_seed                   = "info"
wrong_account                = "error"
ledger_zero_after_t_plus_18h = "error"

# ----------------------------------------------------------------------------
# LANES
#
# Each lane: a cohort of trainer services that share one config. Seeds are
# rendered into service names via `name_template` (handlebars-style `{{seed}}`).
# `env` is applied verbatim; `TRIOS_SEED` is added by the deployer.
#
# `image` = one of { "champion", "wsd_merged", "jepat_merged", "nca_merged" }.
# Resolved at deploy time from --image-sha or the corresponding env var,
# so the manifest does not hard-code SHAs.
#
# `blocked_on` lists string tags the operator uses to gate deployment; if any
# are present, `tri railway plan9 deploy --lane=<L>` refuses unless --force.
# ----------------------------------------------------------------------------

[[lanes]]
lane          = "L1_attn_backward"
account       = "acc1"
project_id    = "e4fe33bb-3b09-4842-9782-7d2dea1abc9b"
env_id        = "54e293b9-00a9-4102-814d-db151636d96e"
seeds         = [210, 211, 212]
name_template = "trios-train-seed-{{seed}}-L1-attnbw"
image         = "champion"
state         = "running"       # deployed at 2026-04-27T18:01Z
[lanes.env]
STEPS            = "81000"
HIDDEN           = "828"
ATTN_LAYERS      = "2"
LR               = "0.003"
OPTIMIZER        = "adamw"
CONFIG_LANE      = "L1_attn_backward"
LANE_KICK_TARGET = "-0.20_BPB"

