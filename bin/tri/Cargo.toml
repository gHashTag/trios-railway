[dependencies.tri-hunt]
path = "../../crates/tri-hunt"

[dependencies.tri-exp]
path = "../../crates/tri-exp"

[dependencies.tri-canon]
path = "../../crates/tri-canon"

[dependencies.tri-ledger]
path = "../../crates/tri-ledger"

[dependencies.trios-railway-core]
path = "../../crates/trios-railway-core"
