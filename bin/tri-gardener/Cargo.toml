[package]
name        = "tri-gardener"
description = "tri-gardener — autonomous orchestrator for the IGLA marathon (Gate-2 1.85 → Gate-3 1.5)."
version.workspace      = true
edition.workspace      = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
rust-version.workspace = true

[lints]
workspace = true

[[bin]]
name = "tri-gardener"
path = "src/main.rs"

[dependencies]
anyhow             = { workspace = true }
clap               = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
toml               = { workspace = true }
# Workspace tokio + extra features for signal handling and time::pause in tests.
tokio              = { version = "1", features = ["macros", "rt-multi-thread", "fs", "io-util", "signal", "time", "test-util", "rt"] }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
chrono             = { workspace = true }

trios-railway-core       = { path = "../../crates/trios-railway-core" }
trios-railway-audit      = { path = "../../crates/trios-railway-audit" }
trios-railway-experience = { path = "../../crates/trios-railway-experience" }

tokio-postgres = { workspace = true }
async-trait    = "0.1"
uuid           = { workspace = true }
reqwest        = { workspace = true }
regex          = "1"
thiserror      = { workspace = true }
