# E6: HYBRID-001 test (ternary bulk + GF16 critical)
# Goal: Validate hybrid architecture feasibility
# Expectation: ≥96.5% MNIST accuracy proxy (should match GF16 perfect match)

[experiment]
name = "e6-hybrid-001-test"
seed = 42
priority = 7

[model]
hidden_dim = 1024
context_len = 12
architecture = "hybrid_v1"  # Ternary bulk + GF16 critical layers

[hybrid]
ternary_layers = ["layer1", "layer2", "layer3", "layer4"]  # Bulk ternary
gf16_layers = ["attention_qk", "attention_v", "final_fc"]  # Critical path

[training]
steps_budget = 1000
warmup_steps = 100
learning_rate = 0.0025
batch_size = 128
gradient_accumulation_steps = 1

[quantization]
enabled = true
ternary_format = "naive"  # -1/0/+1
gf16_format = "gf16"  # DLFloat-6:9

[output]
log_every = 100
save_every = 1000
metrics = ["loss", "bpb_samples", "grad_norm", "hybrid_stats"]

[meta]
category = "hybrid-validation"
target_gate = "hybrid-001"
expected_accuracy_min = 96.5  # MNIST proxy target
fpga_target_gops = 18.4  # XC7A100T target (1.44× FP32)
note = "3T+15GF16 hybrid = 18.4 GOPS at 100MHz per FPGA table"
risk = "high"  # Architecture complexity
