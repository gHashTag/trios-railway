# GATE-0 SMOKE RACE — single override applied to every tag-config in
# bin/tri-gardener/queue.toml. The smoke runner injects [smoke] over
# every base config before deploying.
#
# Anchor: phi^2 + phi^-2 = 3 · TRINITY · SMOKE BEFORE FIRE

[smoke]
override = true
max_steps = 500
eval_every = 50
checkpoint_every = 250
bpb_emit_every = 10
batch_size = 4
warmup_steps = 50
dataset_subset = 0.10
wallclock_budget_minutes = 30

[smoke.naming]
# canon: IGLA-<TYPE>-<FORMAT>-E<NNNN>-<TAG>-SMOKE-rng<NNN>
tag_marker = "SMOKE"
seed_range_low = 500
seed_range_high = 600
first_exp_id = 500

[smoke.experiments]
# (model, tag, [rng_seeds])
WSD     = { model = "HYBRID", rng_seeds = [500, 501, 502] }
BS8     = { model = "HYBRID", rng_seeds = [510, 511, 512] }
GRADFIX_JEPAT = { model = "JEPA-T", rng_seeds = [520, 521, 522], primary_loss = "bpb" }
GRADFIX_NCA   = { model = "NCA",    rng_seeds = [530, 531, 532], primary_loss = "bpb" }
EMA10   = { model = "HYBRID", rng_seeds = [540, 541, 542] }
h512    = { model = "HYBRID", rng_seeds = [550, 551, 552] }
h768    = { model = "HYBRID", rng_seeds = [560, 561, 562] }

[smoke.acceptance]
# 15-criterion gate. Pure-logic checks live in tri-gardener crate as
# Rust tests; live-infra ones are documented stubs for the operator's
# tri smoke-race driver. #15 closes #109 P0 (tiny_shakespeare bug).
pure_logic_count = 10
live_infra_count = 5

[smoke.acceptance.corpus]
# Criterion #15 — every deployed service must emit a `corpus=<name>`
# stdout line whose value equals `required` within `deadline_seconds`
# of deploy ack. Closes #109 P0 (the entire fleet was historically
# trained on tiny_shakespeare without anyone noticing). Smoke is
# NO-GO if any of the 21 services logs anything other than fineweb.
required = "fineweb"
deadline_seconds = 120
stdout_pattern = "corpus=([a-z_][a-z0-9_]*)"
