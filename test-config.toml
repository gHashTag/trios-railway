name = "test"
steps = 1000
seed = 43
target_bpb = 1.85

[model]
d_model = 256
n_layers = 3
n_heads = 8
vocab_size = 32000
seq_len = 1024
hybrid_attn = false

[optimizer]
kind = "adamw"
lr = 0.003
beta1 = 0.9
beta2 = 0.95
weight_decay = 0.04
schedule = "phi"
warmup_steps = 500

[data]
corpus = "fineweb"
train_path = "data/tiny_shakespeare.txt"
val_path = "data/tiny_shakespeare_val.bin"
batch_size = 4
batch_tokens = 524288

[objective]
w_ce = 1.0
w_jepa = 0.0
w_nca = 0.0

[ledger]
jsonl_path = "test_results.jsonl"
push = false
embargo_path = "assertions/embargo.txt"

[gate2]
min_step = 4000
seeds = [43, 44, 45]
victory_bpb = 1.85
