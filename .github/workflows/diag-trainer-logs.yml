name: DIAG — pull trainer deploy logs
on:
  workflow_dispatch:
    inputs:
      account:
        description: "ACC1..ACC7"
        default: "ACC1"
      service_name_filter:
        description: "substring to match (regex, case-insensitive)"
        default: "matrix"

jobs:
  diag:
    runs-on: ubuntu-latest
    env:
      T1: ${{ secrets.RAILWAY_TOKEN_ACC1 }}
      T2: ${{ secrets.RAILWAY_TOKEN_ACC2 }}
      T3: ${{ secrets.RAILWAY_TOKEN_ACC3 }}
      T4: ${{ secrets.RAILWAY_TOKEN_ACC4 }}
      T5: ${{ secrets.RAILWAY_TOKEN_ACC5 }}
      T6: ${{ secrets.RAILWAY_TOKEN_ACC6 }}
      T7: ${{ secrets.RAILWAY_TOKEN_ACC7 }}
    steps:
      - name: probe + fetch logs
        run: |
          ACC="${{ github.event.inputs.account }}"
          FILTER="${{ github.event.inputs.service_name_filter }}"
          N="${ACC#ACC}"; VAR="T$N"; TOK="${!VAR}"
          R=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" -H "Project-Access-Token: $TOK" \
            -d '{"query":"{ projectToken { project { id environments { edges { node { id name } } } services { edges { node { id name deployments(first:3){ edges { node { id status createdAt } } } } } } } } }"}')
          echo "=== fleet (first 5 names) ==="
          echo "$R" | jq -r '.data.projectToken.project.services.edges[].node.name' | head -5
          # pick first service matching FILTER, with non-NONE deployment
          SVC_JSON=$(echo "$R" | jq --arg f "$FILTER" '[.data.projectToken.project.services.edges[] | select(.node.name|test($f;"i")) | .node][0]')
          SVC_ID=$(echo "$SVC_JSON" | jq -r '.id')
          SVC_NAME=$(echo "$SVC_JSON" | jq -r '.name')
          DEP_ID=$(echo "$SVC_JSON" | jq -r '.deployments.edges[0].node.id // empty')
          DEP_STATUS=$(echo "$SVC_JSON" | jq -r '.deployments.edges[0].node.status // empty')
          DEP_TS=$(echo "$SVC_JSON" | jq -r '.deployments.edges[0].node.createdAt // empty')
          echo "=== picked ==="
          echo "service: $SVC_NAME ($SVC_ID)"
          echo "deployment: $DEP_ID status=$DEP_STATUS at=$DEP_TS"
          # ENV vars
          echo "=== variables on service ==="
          PROJ=$(echo "$R" | jq -r '.data.projectToken.project.id')
          ENVI=$(echo "$R" | jq -r '.data.projectToken.project.environments.edges[0].node.id')
          VARS=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" -H "Project-Access-Token: $TOK" \
            -d "{\"query\":\"{ variables(projectId:\\\"$PROJ\\\", environmentId:\\\"$ENVI\\\", serviceId:\\\"$SVC_ID\\\") }\"}")
          echo "$VARS" | jq '.data.variables | to_entries | map(select(.key|test("DATABASE_URL|POSTGRES_URL|MATRIX|OPTIMIZER|FORMAT|STEPS|HIDDEN|SEED|CANON_NAME"))) | from_entries'
          # logs
          echo "=== deploymentLogs ==="
          LOGS=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" -H "Project-Access-Token: $TOK" \
            -d "{\"query\":\"{ deploymentLogs(deploymentId:\\\"$DEP_ID\\\", limit:300) { message severity timestamp } }\"}")
          echo "$LOGS" | jq -r '.data.deploymentLogs[]? | "\(.timestamp) [\(.severity)] \(.message)"' | tail -150
          # show raw error if logs query failed
          echo "$LOGS" | jq '.errors // empty'
          echo "=== buildLogs (last 200) ==="
          BUILDLOGS=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" -H "Project-Access-Token: $TOK" \
            -d "{\"query\":\"query(\$id: String!){ buildLogs(deploymentId:\$id, limit:200){ message timestamp severity } }\",\"variables\":{\"id\":\"$DEP_ID\"}}")
          echo "$BUILDLOGS" | jq -r '.data.buildLogs[]? | [.timestamp, .severity, .message] | @tsv' | tail -200
          echo "$BUILDLOGS" | jq '.errors // empty'
