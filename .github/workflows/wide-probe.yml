name: WIDE-PROBE — full SSOT scan
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-24.04
    env:
      RAILWAY_POSTGRES_URL: ${{ secrets.RAILWAY_POSTGRES_URL }}
    steps:
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
      - name: SHORT-WAVE-MATRIX last 6h
        run: |
          psql "$RAILWAY_POSTGRES_URL" -c "
          SELECT format, algo, ROUND(MIN(bpb)::numeric,4) AS best_bpb, MAX(step) AS max_step, COUNT(*) AS n
          FROM ssot.bpb_samples
          WHERE canon_name LIKE 'IGLA-SHORT-WAVE-MATRIX-%' AND ts > NOW() - INTERVAL '6 hours'
          GROUP BY format, algo ORDER BY best_bpb;"
      - name: unique canon_names last 1h
        run: |
          psql "$RAILWAY_POSTGRES_URL" -c "
          SELECT canon_name, COUNT(*) n, MAX(step) max_step, ROUND(MIN(bpb)::numeric,4) best
          FROM ssot.bpb_samples
          WHERE canon_name LIKE 'IGLA-SHORT-WAVE-MATRIX-%' AND ts > NOW() - INTERVAL '1 hour'
          GROUP BY canon_name ORDER BY best;"
      - name: latest 10 writes
        run: |
          psql "$RAILWAY_POSTGRES_URL" -c "
          SELECT canon_name, format, algo, step, ROUND(bpb::numeric,4) bpb, ts
          FROM ssot.bpb_samples
          ORDER BY ts DESC LIMIT 10;"
      - name: total rows + last-write age
        run: |
          psql "$RAILWAY_POSTGRES_URL" -c "
          SELECT COUNT(*) total_rows, MAX(ts) last_write, NOW()-MAX(ts) age FROM ssot.bpb_samples;"
