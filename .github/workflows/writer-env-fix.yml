name: Writer Env Fix (DATABASE_URL on matrix runners)

# Anchor: phi^2 + phi^-2 = 3 · DOI 10.5281/zenodo.19227877
#
# Lane: L-WRITER-ENV-FIX (refs gHashTag/trios-railway#126, gHashTag/trios#446).
#
# Root cause (confirmed): src/neon_writer.rs in `trios-trainer-igla` is a
# silent no-op when none of `NEON_DATABASE_URL`, `TRIOS_NEON_DSN`, or
# `DATABASE_URL` is set. None of the 19 matrix-runner services deployed
# in Wave 11–17 had any of these env vars; they have been training
# silently into /dev/null for ~17h. That is why the Audit Watchdog reads
# `Ledger rows = 0` despite all runners being alive.
#
# This workflow patches `NEON_DATABASE_URL` (Railway-resolved reference
# to `phd-postgres-ssot.DATABASE_URL`) onto every affected service and
# triggers `serviceInstanceRedeploy`. The trainer / sidecar / canon
# bridge will then pick up the env var on next boot and start writing
# real ledger rows.
#
# Per L-NEON-RENAME (gHashTag/trios-railway PR #125), the binaries
# already accept `RAILWAY_POSTGRES_URL` as the new primary with
# `NEON_DATABASE_URL` as legacy fallback; this workflow sets the
# *legacy* var because the trainer image (`ghcr.io/ghashtag/trios-trainer-igla:latest`)
# is the long-running one for the matrix lane and `neon_writer.rs` reads
# the legacy name. The MCP service (`db786a4b`) additionally gets
# `RAILWAY_POSTGRES_URL` because `crates/trios-railway-mcp/src/tools.rs`
# reads the new name.
#
# Skipped (manual operator handling — secrets not in repo):
#   acc4 believable-connection (`0247abaa`):
#     - 8a15af8d trios-mr-acc4-runner
#     - c78218a5 trios-mr-coverage-c-runner
#   acc6 robust-radiance (`475a2290`):
#     - 422b1ffd trios-mr-acc6-runner
#   (3 services skipped; flagged in the workflow output.)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "PHI" to confirm. Anchor: phi^2 + phi^-2 = 3.'
        required: true

permissions:
  contents: read

concurrency:
  group: writer-env-fix
  cancel-in-progress: false

jobs:
  fix:
    if: ${{ inputs.confirm == 'PHI' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TOKEN_ACC1: ${{ secrets.RAILWAY_TOKEN_ACC1 }}
      TOKEN_ACC2: ${{ secrets.RAILWAY_TOKEN_ACC2 }}
      RAILWAY_TOKEN_AUTH: project  # B-18 fix (2026-05-14): all ACC1..7 tokens are project-scoped (PAT), not team. Verified by token-classify.yml run 25846091578.
      # B-19 fix (2026-05-14): real project IDs verified by token-classify.yml
      # run 25846091578 — PAT/projectToken returned ACC1->IGLA RACE,
      # ACC2->IGLA. Previous values (e4fe33bb / 12c508c7) bound to projects
      # the PATs did NOT control, so `project(id:$x)` returned null and the
      # job exited 5 "could not resolve production env". With PAT-implicit
      # `projectToken.project` query (no id arg) the env_id is discovered
      # at runtime — these IGLA_/ACC2_PROJECT_ID env vars are now
      # informational only (kept for the audit-trail in logs).
      IGLA_PROJECT_ID: f29aa9dd-ca0b-460f-ad24-c7680c6717fb  # IGLA RACE (ACC1 PAT scope)
      ACC2_PROJECT_ID: ad0f8f04-c56d-4b11-9350-cc0c2700b9db  # IGLA (ACC2 PAT scope)
      MCP_SERVICE_ID: db786a4b-5a79-4643-b915-e9184680cf97
      # Railway-ref placeholder. GH Actions escape: outer ${{ ... }}
      # evaluates a single-quoted literal containing the literal
      # `${{...}}` Railway placeholder. Railway stores this verbatim and
      # resolves it at runtime against the SoT service `phd-postgres-ssot`.
      RW_REF: ${{ '${{phd-postgres-ssot.DATABASE_URL}}' }}

    steps:
      - name: Sanity-check tokens
        run: |
          set -euo pipefail
          if [[ -z "${TOKEN_ACC1}" ]]; then
            echo "::error::RAILWAY_TOKEN_ACC1 secret is empty"
            exit 2
          fi
          if [[ -z "${TOKEN_ACC2}" ]]; then
            echo "::error::RAILWAY_TOKEN_ACC2 secret is empty"
            exit 2
          fi
          # B-18 fix: use Project-Access-Token (PAT) header + project-scoped query.
          # The old Authorization: Bearer + { projects { edges } } pattern
          # required an account/team token; all ACC1..7 secrets are PAT.
          for L in ACC1 ACC2; do
            T_VAR="TOKEN_${L}"
            T="${!T_VAR}"
            curl -sS -X POST https://backboard.railway.com/graphql/v2 \
                -H "Content-Type: application/json" \
                -H "Project-Access-Token: $T" \
                -d '{"query":"{ projectToken { project { id name } } }"}' \
                | jq -e '.data.projectToken.project.id' > /dev/null || {
                  echo "::error::token $L failed sanity check (Project-Access-Token mode)"
                  exit 3
                }
            echo "token $L OK (PAT scope)"
          done

      - name: Apply fix to all reachable services
        env:
          # 17 IGLA non-MCP services (the MCP `db786a4b` is patched LAST in
          # a separate block below, on purpose). Two columns: 8-char id |
          # human name. The 8-char id is what Railway exposes in URLs and
          # in the operator manifest; the workflow looks up the full UUID
          # by prefix-matching against `project.services` to be safe.
          # DYNAMIC DISCOVERY (2026-05-14, B-20):
          # Hardcoded `trios-mr-*` IDs were phantoms left over from the
          # pre-scarab-pull-loop architecture and DELETED from Railway
          # months ago. The workflow logged `Not Authorized` for every
          # phantom service, never actually patched the live writers
          # (scarab-*, phase1-*) → writer COMA 1014 min.
          # We now query Railway GraphQL for the live service list at
          # runtime, filtered to known writer prefixes.
          # Excluded prefixes (regex): ^Postgres$|^trios$|^trios-railway$|^trios-mcp$|^TEST-
          WRITER_PREFIX_REGEX: '^(scarab-|phase1-|trios-train-|trios-matrix-bot$|trios-postrun-)'
          EXCLUDE_REGEX: '^(Postgres$|trios$|trios-railway$|trios-mcp$|TEST-)'
        run: |
          set -uo pipefail

          # The id strings above are the 8-char prefixes the operator
          # tracks. Railway's `variableUpsert.serviceId: String!` and
          # `serviceInstanceRedeploy.serviceId: String!` expect FULL
          # UUIDs, so we resolve each prefix against the project's
          # service list and map prefix → full UUID at the start of each
          # project block.

          fail_count=0
          ok_count=0

          # ----- helper: resolve production env UUID for a project -----
          # B-19 fix (2026-05-14): PAT-implicit `projectToken.project` query.
          # The previous form `query env($projectId){ project(id:$projectId){ ... } }`
          # returned `{"data":{"project":null}}` under PAT, because PAT scope
          # binds to a single project implicitly — the explicit `id` arg
          # selects a DIFFERENT project the token can't see. Verified working
          # form lives in wave-a-massive.yml (line 28): no id arg, no
          # variables, `projectToken.project.environments`. Last good run
          # of that workflow: 25754312720 @ 2026-05-12 18:31Z.
          resolve_env() {
            local TOKEN="$1"
            curl -sS -X POST https://backboard.railway.com/graphql/v2 \
                -H "Content-Type: application/json" \
                -H "Project-Access-Token: $TOKEN" \
                -d '{"query":"{ projectToken { project { environments { edges { node { id name } } } } } }"}' \
                | jq -r '.data.projectToken.project.environments.edges[] | select(.node.name=="production") | .node.id' \
                | head -n 1
          }

          # ----- helper: fetch all (id,name) for a project as JSON -----
          # Returns a JSON array `[{"id":"<full UUID>","name":"<svc name>"}, ...]`.
          # B-19 fix (2026-05-14): PAT-implicit form same as resolve_env above.
          fetch_services() {
            local TOKEN="$1"
            curl -sS -X POST https://backboard.railway.com/graphql/v2 \
                -H "Content-Type: application/json" \
                -H "Project-Access-Token: $TOKEN" \
                -d '{"query":"{ projectToken { project { services { edges { node { id name } } } } } }"}' \
                | jq '[.data.projectToken.project.services.edges[].node]'
          }

          # ----- helper: resolve 8-char prefix → full UUID -----
          # Args: $1 = 8-char prefix; $2 = JSON array of {id,name} from
          # fetch_services. Echoes the full UUID, or empty + non-zero
          # exit if no unique match.
          resolve_id() {
            local PREFIX="$1"
            local SERVICES_JSON="$2"
            local FULL
            FULL=$(echo "$SERVICES_JSON" | jq -r --arg p "$PREFIX" \
                '[ .[] | select(.id|startswith($p)) | .id ] | unique | .[]')
            local COUNT
            COUNT=$(echo "$FULL" | grep -c . || true)
            if [[ "$COUNT" != "1" ]]; then
              echo ""
              return 1
            fi
            echo "$FULL"
          }

          # ----- helper: upsert one variable on one service -----
          upsert_var() {
            local TOKEN="$1"
            local PROJECT_ID="$2"
            local ENV_ID="$3"
            local SVC_ID="$4"
            local NAME="$5"
            local VALUE="$6"
            local PAYLOAD
            PAYLOAD=$(jq -n \
                --arg p "$PROJECT_ID" \
                --arg e "$ENV_ID" \
                --arg s "$SVC_ID" \
                --arg n "$NAME" \
                --arg v "$VALUE" \
                '{query:"mutation variableUpsert($input: VariableUpsertInput!) { variableUpsert(input: $input) }", variables:{input:{projectId:$p, environmentId:$e, serviceId:$s, name:$n, value:$v}}}')
            local RESP
            # B-18 fix: PAT header.
            RESP=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
                -H "Content-Type: application/json" \
                -H "Project-Access-Token: $TOKEN" \
                -d "$PAYLOAD")
            if echo "$RESP" | jq -e '.errors' > /dev/null; then
              echo "    upsert $NAME: ERR — $(echo "$RESP" | jq -c '.errors')"
              return 1
            fi
            echo "    upsert $NAME: OK"
            return 0
          }

          # ----- helper: redeploy one service -----
          redeploy() {
            local TOKEN="$1"
            local SVC_ID="$2"
            local ENV_ID="$3"
            local PAYLOAD
            PAYLOAD=$(jq -n \
                --arg s "$SVC_ID" \
                --arg e "$ENV_ID" \
                '{query:"mutation serviceInstanceRedeploy($serviceId: String!, $environmentId: String!) { serviceInstanceRedeploy(serviceId: $serviceId, environmentId: $environmentId) }", variables:{serviceId:$s, environmentId:$e}}')
            local RESP
            # B-18 fix: PAT header.
            RESP=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
                -H "Content-Type: application/json" \
                -H "Project-Access-Token: $TOKEN" \
                -d "$PAYLOAD")
            if echo "$RESP" | jq -e '.errors' > /dev/null; then
              echo "    redeploy: ERR — $(echo "$RESP" | jq -c '.errors')"
              return 1
            fi
            echo "    redeploy: OK"
            return 0
          }

          # ===================================================================
          # IGLA project (acc1 token) — non-MCP services first, MCP last
          # (paranoia: the MCP redeploy is sequenced last so its restart
          #  cannot interfere with this workflow's GraphQL calls, even
          #  though we use Railway GraphQL directly with TOKEN_ACC1, not
          #  the MCP).
          # ===================================================================
          echo "::group::resolve IGLA env"
          IGLA_ENV_ID=$(resolve_env "$TOKEN_ACC1")
          if [[ -z "$IGLA_ENV_ID" ]]; then
            echo "::error::could not resolve IGLA production environment"
            exit 4
          fi
          echo "IGLA env: $IGLA_ENV_ID"
          echo "::endgroup::"

          # B-20: dynamic service discovery instead of hardcoded TARGETS.
          echo "::group::discover IGLA RACE writers + Postgres"
          IGLA_SERVICES_JSON=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Project-Access-Token: $TOKEN_ACC1" \
              -d "$(jq -n --arg id "$IGLA_PROJECT_ID" '{query:"query Q($id:String!){ project(id:$id){ services{edges{node{id name}}} } }", variables:{id:$id}}')")
          IGLA_TARGETS=$(echo "$IGLA_SERVICES_JSON" \
            | jq -r --arg w "$WRITER_PREFIX_REGEX" --arg x "$EXCLUDE_REGEX" \
                '.data.project.services.edges[].node | select(.name|test($w)) | select(.name|test($x)|not) | "\(.id) \(.name)"')
          IGLA_PG_SVC=$(echo "$IGLA_SERVICES_JSON" | jq -r '.data.project.services.edges[].node | select(.name=="Postgres" or .name=="phd-postgres-ssot") | .id' | head -1)
          if [[ -z "$IGLA_PG_SVC" ]]; then
            echo "::error::IGLA Postgres service not found"
            exit 6
          fi
          # B-20: read literal DATABASE_URL value from Postgres service (public proxy URL).
          # Reference syntax ${{Postgres.DATABASE_URL}} fails when service name mismatches.
          IGLA_DB_URL=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Project-Access-Token: $TOKEN_ACC1" \
              -d "$(jq -n --arg p "$IGLA_PROJECT_ID" --arg id "$IGLA_PG_SVC" --arg env "$IGLA_ENV_ID" '{query:"query Q($p:String!,$id:String!,$env:String!){ variables(projectId:$p, serviceId:$id, environmentId:$env) }", variables:{p:$p, id:$id, env:$env}}')" \
            | jq -r '.data.variables.DATABASE_PUBLIC_URL // .data.variables.RAILWAY_POSTGRES_URL // .data.variables.DATABASE_URL // ""')
          if [[ -z "$IGLA_DB_URL" || "$IGLA_DB_URL" == "null" ]]; then
            echo "::error::IGLA Postgres public URL not resolved"
            exit 7
          fi
          # Mask URL in logs (contains password).
          echo "::add-mask::$IGLA_DB_URL"
          echo "IGLA Postgres URL: resolved (length=${#IGLA_DB_URL})"
          echo "discovered IGLA writers:"; echo "$IGLA_TARGETS" | sed 's/^/  /'
          IGLA_COUNT=$(echo "$IGLA_TARGETS" | grep -c . || true)
          echo "IGLA writer count: $IGLA_COUNT"
          echo "::endgroup::"

          while IFS= read -r line; do
            line="$(echo "$line" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
            [[ -z "$line" ]] && continue
            SVC_ID="${line%% *}"
            NAME="${line##* }"
            echo "::group::IGLA $NAME ($SVC_ID)"
            ok=1
            upsert_var "$TOKEN_ACC1" "$IGLA_PROJECT_ID" "$IGLA_ENV_ID" "$SVC_ID" "DATABASE_URL" "$IGLA_DB_URL" || ok=0
            redeploy   "$TOKEN_ACC1" "$SVC_ID" "$IGLA_ENV_ID" || ok=0
            if [[ "$ok" -eq 1 ]]; then
              echo "[OK] $NAME $SVC_ID"
              ok_count=$((ok_count + 1))
            else
              echo "[FAIL] $NAME $SVC_ID"
              fail_count=$((fail_count + 1))
            fi
            echo "::endgroup::"
          done <<< "$IGLA_TARGETS"

          # ===================================================================
          # acc2 project — coverage-b + acc2 runner
          # ===================================================================
          echo "::group::resolve acc2 env"
          ACC2_ENV_ID=$(resolve_env "$TOKEN_ACC2")
          if [[ -z "$ACC2_ENV_ID" ]]; then
            echo "::error::could not resolve acc2 production environment"
            exit 5
          fi
          echo "acc2 env: $ACC2_ENV_ID"
          echo "::endgroup::"

          echo "::group::discover ACC2 writers + Postgres"
          ACC2_SERVICES_JSON=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Project-Access-Token: $TOKEN_ACC2" \
              -d "$(jq -n --arg id "$ACC2_PROJECT_ID" '{query:"query Q($id:String!){ project(id:$id){ services{edges{node{id name}}} } }", variables:{id:$id}}')")
          ACC2_TARGETS=$(echo "$ACC2_SERVICES_JSON" \
            | jq -r --arg w "$WRITER_PREFIX_REGEX" --arg x "$EXCLUDE_REGEX" \
                '.data.project.services.edges[].node | select(.name|test($w)) | select(.name|test($x)|not) | "\(.id) \(.name)"')
          ACC2_PG_SVC=$(echo "$ACC2_SERVICES_JSON" | jq -r '.data.project.services.edges[].node | select(.name=="Postgres" or .name=="phd-postgres-ssot") | .id' | head -1)
          if [[ -z "$ACC2_PG_SVC" ]]; then
            echo "::warning::ACC2 Postgres service not found — falling back to IGLA URL"
            ACC2_DB_URL="$IGLA_DB_URL"
          else
            ACC2_DB_URL=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
                -H "Content-Type: application/json" \
                -H "Project-Access-Token: $TOKEN_ACC2" \
                -d "$(jq -n --arg p "$ACC2_PROJECT_ID" --arg id "$ACC2_PG_SVC" --arg env "$ACC2_ENV_ID" '{query:"query Q($p:String!,$id:String!,$env:String!){ variables(projectId:$p, serviceId:$id, environmentId:$env) }", variables:{p:$p, id:$id, env:$env}}')" \
              | jq -r '.data.variables.DATABASE_PUBLIC_URL // .data.variables.RAILWAY_POSTGRES_URL // .data.variables.DATABASE_URL // ""')
            if [[ -z "$ACC2_DB_URL" || "$ACC2_DB_URL" == "null" ]]; then
              echo "::warning::ACC2 Postgres URL not resolved — falling back to IGLA URL"
              ACC2_DB_URL="$IGLA_DB_URL"
            fi
          fi
          echo "::add-mask::$ACC2_DB_URL"
          echo "ACC2 Postgres URL: resolved (length=${#ACC2_DB_URL})"
          # NOTE: ACC2 writers connect to IGLA SSOT via public URL anyway — use IGLA_DB_URL.
          ACC2_DB_URL="$IGLA_DB_URL"
          echo "discovered ACC2 writers:"; echo "$ACC2_TARGETS" | sed 's/^/  /'
          ACC2_COUNT=$(echo "$ACC2_TARGETS" | grep -c . || true)
          echo "ACC2 writer count: $ACC2_COUNT"
          echo "::endgroup::"

          while IFS= read -r line; do
            line="$(echo "$line" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
            [[ -z "$line" ]] && continue
            SVC_ID="${line%% *}"
            NAME="${line##* }"
            echo "::group::acc2 $NAME ($SVC_ID)"
            ok=1
            upsert_var "$TOKEN_ACC2" "$ACC2_PROJECT_ID" "$ACC2_ENV_ID" "$SVC_ID" "DATABASE_URL" "$ACC2_DB_URL" || ok=0
            redeploy   "$TOKEN_ACC2" "$SVC_ID" "$ACC2_ENV_ID" || ok=0
            if [[ "$ok" -eq 1 ]]; then
              echo "[OK] $NAME $SVC_ID"
              ok_count=$((ok_count + 1))
            else
              echo "[FAIL] $NAME $SVC_ID"
              fail_count=$((fail_count + 1))
            fi
            echo "::endgroup::"
          done <<< "$ACC2_TARGETS"

          # ===================================================================
          # MCP last (IGLA project, dual var: legacy + new — see L-NEON-RENAME)
          # B-20: dynamic lookup; the legacy hardcoded MCP_SERVICE_ID was
          # a phantom (db786a4b-…) deleted from Railway months ago.
          # ===================================================================
          MCP_SVC=$(echo "$IGLA_SERVICES_JSON" | jq -r '.data.project.services.edges[].node | select(.name=="trios-mcp" or .name=="trios-railway-mcp") | .id' | head -1)
          if [[ -z "$MCP_SVC" ]]; then
            echo "::warning::trios-mcp not found in IGLA RACE — skipping MCP refresh"
          else
            echo "::group::IGLA trios-mcp ($MCP_SVC) — last on purpose"
            ok=1
            upsert_var "$TOKEN_ACC1" "$IGLA_PROJECT_ID" "$IGLA_ENV_ID" "$MCP_SVC" "DATABASE_URL"         "$IGLA_DB_URL" || ok=0
            upsert_var "$TOKEN_ACC1" "$IGLA_PROJECT_ID" "$IGLA_ENV_ID" "$MCP_SVC" "RAILWAY_POSTGRES_URL" "$IGLA_DB_URL" || ok=0
            redeploy   "$TOKEN_ACC1" "$MCP_SVC" "$IGLA_ENV_ID" || ok=0
            if [[ "$ok" -eq 1 ]]; then
              echo "[OK] trios-mcp $MCP_SVC"
              ok_count=$((ok_count + 1))
            else
              echo "[FAIL] trios-mcp $MCP_SVC"
              fail_count=$((fail_count + 1))
            fi
            echo "::endgroup::"
          fi

          # B-20: stale acc4/acc6 warning block removed — those projects were
          # part of the pre-scarab fleet that no longer exists.

          # ===================================================================
          # Final verdict
          # ===================================================================
          {
            echo "## Writer Env Fix"
            echo ""
            echo "- OK:   $ok_count"
            echo "- FAIL: $fail_count"
            echo "- SKIPPED (no token): 3 services on acc4/acc6"
            echo ""
            echo "Anchor: \`phi^2 + phi^-2 = 3\` · DOI 10.5281/zenodo.19227877"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$fail_count" -gt 0 ]]; then
            echo "::error::$fail_count service(s) failed; see logs above"
            exit 1
          fi
          echo "all $ok_count services patched + redeployed"
