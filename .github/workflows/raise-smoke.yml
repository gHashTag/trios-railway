name: L-RAISE-SMOKE — single service end-to-end

# ONE SHOT: create 1 service on ACC4 (empty IGLA project), pin to new image,
# verify it boots and writes a BPB row within 5 min.
# Anchor: phi^2 + phi^-2 = 3

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name"
        default: "smoke-gf16-muon-rng1597"
      seed:
        description: "Seed (Fibonacci canon)"
        default: "1597"
      steps:
        description: "Training steps"
        default: "500"

permissions:
  contents: read

jobs:
  raise:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      T4: ${{ secrets.RAILWAY_TOKEN_ACC4 }}
      RAILWAY_POSTGRES_URL: ${{ secrets.RAILWAY_POSTGRES_URL }}
      SVC: ${{ inputs.service_name }}
      SEED: ${{ inputs.seed }}
      STEPS: ${{ inputs.steps }}
      IMG: "ghcr.io/ghashtag/trios-trainer-igla:sha-20c79fe"
    steps:
      - name: Verify ACC4 token + project
        run: |
          set -e
          if [[ -z "$T4" ]]; then echo "::error::T4 empty"; exit 2; fi
          if [[ -z "$RAILWAY_POSTGRES_URL" ]]; then echo "::error::RAILWAY_POSTGRES_URL missing on this repo"; exit 2; fi
          curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Project-Access-Token: $T4" \
            -d '{"query":"{ projectToken { project { id name environments { edges { node { id name } } } } } }"}' \
          | tee /tmp/proj.json | jq '.'
          PROJ=$(jq -r .data.projectToken.project.id /tmp/proj.json)
          ENV=$(jq -r '.data.projectToken.project.environments.edges[0].node.id' /tmp/proj.json)
          echo "PROJ=$PROJ" >> $GITHUB_ENV
          echo "ENV=$ENV" >> $GITHUB_ENV

      - name: Create service
        run: |
          set -e
          curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Project-Access-Token: $T4" \
            -d "$(jq -n --arg name "$SVC" --arg img "$IMG" '
              {query:"mutation($i:ServiceCreateInput!){serviceCreate(input:$i){id name}}",
               variables:{i:{name:$name, source:{image:$img}}}}')" \
          | tee /tmp/svc.json | jq '.'
          SID=$(jq -r '.data.serviceCreate.id // .errors[0].message' /tmp/svc.json)
          if [[ "$SID" == "null" || -z "$SID" ]]; then echo "::error::service create failed"; exit 1; fi
          # If it returned the error message instead of id, that's ALSO failure
          if echo "$SID" | grep -qi "error\|failed\|exist"; then
            # Service might already exist — try to fetch it
            curl -sS -X POST https://backboard.railway.com/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Project-Access-Token: $T4" \
              -d '{"query":"{ projectToken { project { services { edges { node { id name } } } } } }"}' \
            | tee /tmp/svcs.json | jq '.'
            SID=$(jq -r --arg n "$SVC" '.data.projectToken.project.services.edges[] | select(.node.name==$n) | .node.id' /tmp/svcs.json)
            echo "reusing existing service: $SID"
          fi
          echo "SID=$SID" >> $GITHUB_ENV

      - name: Set service variables
        run: |
          set -e
          # Critical vars: image is via source above; set env vars for trainer
          for KV in \
            "SEED=$SEED" \
            "STEPS=$STEPS" \
            "LR=0.0001" \
            "HIDDEN=128" \
            "OPTIMIZER=muon" \
            "FORMAT=gf16" \
            "RAILWAY_POSTGRES_URL=$RAILWAY_POSTGRES_URL" \
            "TRIOS_LANE=SMOKE-RAISE" \
            "TRIOS_RUN_ID=smoke-raise-2026-05-12-rng${SEED}" \
            "RUST_LOG=info" \
            "L_R8_SYNTHETIC_FALLBACK=FORBID" \
          ; do
            K="${KV%%=*}"; V="${KV#*=}"
            curl -sS -X POST https://backboard.railway.com/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Project-Access-Token: $T4" \
              -d "$(jq -n --arg p "$PROJ" --arg e "$ENV" --arg s "$SID" --arg k "$K" --arg v "$V" '
                {query:"mutation($i:VariableUpsertInput!){variableUpsert(input:$i)}",
                 variables:{i:{projectId:$p, environmentId:$e, serviceId:$s, name:$k, value:$v}}}')" \
            | jq -r '.data.variableUpsert // .errors[0].message' | xargs -I{} echo "var $K: {}"
          done

      - name: Trigger deploy
        run: |
          set -e
          curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Project-Access-Token: $T4" \
            -d "$(jq -n --arg s "$SID" --arg e "$ENV" '
              {query:"mutation($s:String!,$e:String!){serviceInstanceDeployV2(serviceId:$s, environmentId:$e)}",
               variables:{s:$s, e:$e}}')" \
          | tee /tmp/deploy.json | jq '.'
          echo "deploy triggered, sleeping 60s for boot..."
          sleep 60

      - name: Probe deployment status
        run: |
          set -e
          curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Project-Access-Token: $T4" \
            -d "$(jq -n --arg s "$SID" '
              {query:"query($s:String!){service(id:$s){name deployments(first:3){edges{node{id status createdAt}}}}}",
               variables:{s:$s}}')" \
          | jq '.'
