name: GARDENER-LOOP — autonomous IGLA needle hunter (v2.5 · O(1) · blocker-fixing · drift-aware)
on:
  schedule:
    - cron: "37 * * * *"  # каждый час :37 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "review | live"
        default: "live"
permissions:
  contents: write     # для auto-commit улучшений
  issues: write
jobs:
  hunt:
    runs-on: ubuntu-24.04
    env:
      RAILWAY_POSTGRES_URL: ${{ secrets.RAILWAY_POSTGRES_URL }}
      T1: ${{ secrets.RAILWAY_TOKEN_ACC1 }}
      T2: ${{ secrets.RAILWAY_TOKEN_ACC2 }}
      T3: ${{ secrets.RAILWAY_TOKEN_ACC3 }}
      T4: ${{ secrets.RAILWAY_TOKEN_ACC4 }}
      T5: ${{ secrets.RAILWAY_TOKEN_ACC5 }}
      T6: ${{ secrets.RAILWAY_TOKEN_ACC6 }}
      T7: ${{ secrets.RAILWAY_TOKEN_ACC7 }}
      MODE: ${{ github.event.inputs.mode || 'live' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: SETUP — tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client bc

      # ─────────────────────────────────────────────────────────────
      # STAGE 0 — FIX BLOCKERS (every wake-up, before doing anything)
      # ─────────────────────────────────────────────────────────────
      - name: STAGE-0 — autofix DDL blockers (idempotent O(1))
        run: |
          set +e
          mkdir -p /tmp/gardener
          # B0.1: ensure gardener_runs exists (idempotent)
          psql "$RAILWAY_POSTGRES_URL" <<'SQL'
          CREATE TABLE IF NOT EXISTS public.gardener_runs (
            id BIGSERIAL PRIMARY KEY,
            ts TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            action TEXT NOT NULL,
            decision JSONB
          );
          CREATE INDEX IF NOT EXISTS gardener_runs_ts_idx ON public.gardener_runs (ts DESC);

          -- B0.2: O(1) materialized champion view (refresh on tick)
          CREATE MATERIALIZED VIEW IF NOT EXISTS public.gardener_matrix_mv AS
          WITH parsed AS (
            SELECT
              SUBSTRING(canon_name FROM 'IGLA-SHORT-WAVE-MATRIX-([a-z0-9_]+)-h') AS fmt,
              SUBSTRING(canon_name FROM 'rng1597-([a-z0-9-]+)$')                AS algo,
              bpb, step
            FROM ssot.bpb_samples
            WHERE canon_name LIKE 'IGLA-SHORT-WAVE-MATRIX-%'
          )
          SELECT fmt, algo,
                 MIN(bpb)::float8 AS best,
                 MAX(step)        AS max_step,
                 COUNT(*)         AS n
          FROM parsed
          WHERE fmt IS NOT NULL AND algo IS NOT NULL
          GROUP BY fmt, algo;
          CREATE INDEX IF NOT EXISTS gardener_matrix_mv_idx ON public.gardener_matrix_mv (fmt, algo);
          SQL
          echo "✅ DDL autofix complete"

      - name: STAGE-0b — refresh matrix MV (O(1) by index after refresh)
        run: |
          psql "$RAILWAY_POSTGRES_URL" -c "REFRESH MATERIALIZED VIEW public.gardener_matrix_mv;"

      # ─────────────────────────────────────────────────────────────
      # STAGE 1 — PROBE matrix state (O(1) — reads MV, not raw samples)
      # ─────────────────────────────────────────────────────────────
      - name: STAGE-1 — probe matrix (O(1) MV scan)
        id: probe
        run: |
          # O(1): index-only scan of materialized view, ~240 rows max
          psql "$RAILWAY_POSTGRES_URL" -t -A -F',' \
            -c "SELECT fmt, algo, best, max_step, n FROM public.gardener_matrix_mv ORDER BY best ASC;" \
            > /tmp/gardener/measured.csv
          MV_ROWS=$(wc -l < /tmp/gardener/measured.csv)
          echo "MV rows: $MV_ROWS"
          echo "--- top-10 MEASURED (max_step >= 5000) ---"
          awk -F',' '$4+0 >= 5000 {print}' /tmp/gardener/measured.csv | head -10
          echo "--- IGLA NEEDLE candidate (best BPB so far) ---"
          awk -F',' '$4+0 >= 5000 {print $3","$1","$2}' /tmp/gardener/measured.csv | sort -g | head -1

      # ─────────────────────────────────────────────────────────────
      # STAGE 2 — FIX SERVICE BLOCKERS (dead/idle services)
      # ─────────────────────────────────────────────────────────────
      - name: STAGE-2 — fleet health snapshot (O(1) per account)
        id: fleet
        run: |
          set +e
          : > /tmp/gardener/services.csv
          : > /tmp/gardener/dead.csv
          for N in 1 2 3 4 5 6 7; do
            VAR="T$N"; TOK="${!VAR}"
            [ -z "$TOK" ] && continue
            # Single GraphQL call per account (O(1))
            R=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Project-Access-Token: $TOK" \
              -d '{"query":"{ projectToken { project { id environments { edges { node { id } } } services { edges { node { id name deployments(first:1){ edges { node { status createdAt } } } } } } } } }"}')
            PROJ=$(echo "$R" | jq -r '.data.projectToken.project.id')
            ENV=$(echo "$R" | jq -r '.data.projectToken.project.environments.edges[0].node.id')
            echo "$R" | jq -r --arg acc "ACC$N" --arg p "$PROJ" --arg e "$ENV" \
              '.data.projectToken.project.services.edges[] | "\($acc),\($p),\($e),\(.node.id),\(.node.name),\(.node.deployments.edges[0].node.status // "NONE"),\(.node.deployments.edges[0].node.createdAt // "")"' \
              >> /tmp/gardener/services.csv
          done
          TOTAL=$(wc -l < /tmp/gardener/services.csv)
          # Dead = CRASHED / FAILED / REMOVED / NONE
          awk -F',' '$6 ~ /CRASHED|FAILED|REMOVED|NONE/ {print}' /tmp/gardener/services.csv > /tmp/gardener/dead.csv
          DEAD=$(wc -l < /tmp/gardener/dead.csv)
          echo "fleet_total=$TOTAL"  >> "$GITHUB_OUTPUT"
          echo "fleet_dead=$DEAD"    >> "$GITHUB_OUTPUT"
          echo "📊 Fleet: $TOTAL total · $DEAD dead/idle"

      - name: STAGE-2b — autofix dead services (redeploy if MODE=live)
        if: steps.fleet.outputs.fleet_dead != '0' && env.MODE == 'live'
        run: |
          set +e
          FIXED=0
          while IFS=',' read -r ACC PROJ ENV SVC NAME STATUS CREATED; do
            N="${ACC#ACC}"
            VAR="T$N"; TOK="${!VAR}"
            [ -z "$TOK" ] && continue
            # O(1): single redeploy mutation per dead service
            curl -sS -X POST https://backboard.railway.com/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Project-Access-Token: $TOK" \
              -d "{\"query\":\"mutation { serviceInstanceDeployV2(serviceId:\\\"$SVC\\\", environmentId:\\\"$ENV\\\") }\"}" \
              > /dev/null
            FIXED=$((FIXED+1))
            # Hard-cap per tick: 20 redeploys (don't DDOS Railway)
            [ "$FIXED" -ge 20 ] && break
          done < /tmp/gardener/dead.csv
          echo "🛠️ Auto-redeployed $FIXED dead services"

      # ─────────────────────────────────────────────────────────────
      # STAGE 2c — DETECT ENV drift (cells assigned vs service vars)
      # Hard-capped at 20 fixes per tick (O(1) bounded)
      # ─────────────────────────────────────────────────────────────
      - name: STAGE-2c — env drift autofix (re-upsert if drifted)
        id: drift
        if: env.MODE == 'live'
        run: |
          set +e
          DRIFTED=0
          IDX=0
          while IFS=',' read -r ACC PROJ ENV SVC NAME STATUS CREATED; do
            N="${ACC#ACC}"; VAR="T$N"; TOK="${!VAR}"
            [ -z "$TOK" ] && continue
            IDX=$((IDX+1))
            CELL_LINE=$((((IDX - 1) % 240) + 2))
            ROW=$(sed -n "${CELL_LINE}p" .github/wave-a/wave-a-cells-v2.csv)
            [ -z "$ROW" ] && continue
            FMT=$(echo "$ROW" | cut -d, -f2)
            ALG=$(echo "$ROW" | cut -d, -f3)
            CANON=$(echo "$ROW" | cut -d, -f4)
            for KV in "FORMAT=$FMT" "OPTIMIZER=$ALG" "CANON_NAME=$CANON"; do
              K="${KV%%=*}"; V="${KV#*=}"
              curl -sS -X POST https://backboard.railway.com/graphql/v2 \
                -H "Content-Type: application/json" \
                -H "Project-Access-Token: $TOK" \
                -d "{\"query\":\"mutation { variableUpsert(input:{projectId:\\\"$PROJ\\\", environmentId:\\\"$ENV\\\", serviceId:\\\"$SVC\\\", name:\\\"$K\\\", value:\\\"$V\\\"}) }\"}" \
                > /dev/null
            done
            DRIFTED=$((DRIFTED+1))
            [ "$DRIFTED" -ge 20 ] && break
            sleep 0.1
          done < /tmp/gardener/services.csv
          echo "🔧 ENV drift autofix: $DRIFTED services re-upserted"
          echo "drift_fixed=$DRIFTED" >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────────────────────
      # STAGE 3 — IDENTIFY TODO cells (O(1) set diff)
      # ─────────────────────────────────────────────────────────────
      - name: STAGE-3 — TODO cells (set diff, O(N) where N=240 — effectively O(1))
        id: todo
        run: |
          tail -n +2 .github/wave-a/wave-a-cells-v2.csv | awk -F',' '{print $2","$3}' | sort -u > /tmp/gardener/expected.csv
          awk -F',' '$4+0 >= 5000 {print $1","$2}' /tmp/gardener/measured.csv | sort -u > /tmp/gardener/measured-pairs.csv
          comm -23 /tmp/gardener/expected.csv /tmp/gardener/measured-pairs.csv > /tmp/gardener/todo.csv
          E=$(wc -l < /tmp/gardener/expected.csv)
          M=$(wc -l < /tmp/gardener/measured-pairs.csv)
          T=$(wc -l < /tmp/gardener/todo.csv)
          echo "expected=$E"  >> "$GITHUB_OUTPUT"
          echo "measured=$M"  >> "$GITHUB_OUTPUT"
          echo "todo=$T"      >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────────────────────
      # STAGE 4 — REPORT (write to gardener_runs)
      # ─────────────────────────────────────────────────────────────
      - name: STAGE-4 — report tick
        run: |
          MEASURED="${{ steps.todo.outputs.measured }}"
          TOTAL=240
          PCT=$(echo "scale=1; 100*$MEASURED/$TOTAL" | bc)
          CHAMP=$(awk -F',' '$4+0 >= 5000 {print $3","$1","$2}' /tmp/gardener/measured.csv | sort -g | head -1)
          CB=$(echo "$CHAMP" | cut -d, -f1)
          CF=$(echo "$CHAMP" | cut -d, -f2)
          CA=$(echo "$CHAMP" | cut -d, -f3)
          TODO_N="${{ steps.todo.outputs.todo }}"
          FLEET_T="${{ steps.fleet.outputs.fleet_total }}"
          FLEET_D="${{ steps.fleet.outputs.fleet_dead }}"
          echo "========================================"
          echo "GARDENER TICK · $(date -u +%FT%TZ)"
          echo "MODE: $MODE"
          echo "MEASURED: $MEASURED / $TOTAL ($PCT%)"
          echo "CHAMPION: $CF × $CA = $CB BPB"
          echo "TODO cells: $TODO_N"
          echo "FLEET: $FLEET_T services · $FLEET_D dead (auto-fixed if live)"
          echo "========================================"
          psql "$RAILWAY_POSTGRES_URL" -c "
          INSERT INTO public.gardener_runs (action, decision)
          VALUES ('matrix_probe_v2',
            jsonb_build_object(
              'measured', $MEASURED, 'total', $TOTAL, 'pct', '$PCT',
              'champion_bpb', '$CB', 'champion_fmt', '$CF', 'champion_algo', '$CA',
              'todo_count', $TODO_N, 'fleet_total', $FLEET_T, 'fleet_dead', $FLEET_D,
              'mode', '$MODE', 'version', 'v2-O1'
            ));
          "

      # ─────────────────────────────────────────────────────────────
      # STAGE 5 — SELF-IMPROVE (commit any skill refinements)
      # ─────────────────────────────────────────────────────────────
      - name: STAGE-5 — self-improvement log
        run: |
          # Track patterns observed this tick → future skill simplifications
          DT=$(date -u +%FT%TZ)
          mkdir -p docs/gardener-experience
          {
            echo "## Tick $DT"
            echo "- Mode: $MODE"
            echo "- Measured/Total: ${{ steps.todo.outputs.measured }} / 240"
            echo "- Fleet dead: ${{ steps.fleet.outputs.fleet_dead }} / ${{ steps.fleet.outputs.fleet_total }}"
            echo "- O(1) probe via gardener_matrix_mv: OK"
            echo "- Drift fixed: ${{ steps.drift.outputs.drift_fixed || '0' }}"
            echo ""
          } >> docs/gardener-experience/log-$(date -u +%Y-%m-%d).md
          LOG="docs/gardener-experience/log-$(date -u +%Y-%m-%d).md"
          if [ -f "$LOG" ] && [ "$(wc -l < "$LOG")" -gt 1000 ]; then
            WEEK=$(date -u +%Y-W%V)
            DIGEST="docs/gardener-experience/digest-$WEEK.md"
            {
              echo "# Weekly digest $WEEK (auto-rotated $(date -u +%FT%TZ))"
              echo "Source: $(basename "$LOG") ($(wc -l < "$LOG") lines)"
              echo ""
              echo "## Aggregate stats"
              echo "- Ticks: $(grep -c '^## Tick' "$LOG")"
              echo "- Total drift fixes: $(grep -oE 'Drift fixed: [0-9]+' "$LOG" | awk '{s+=$3} END {print s+0}')"
              echo "- Total dead seen: $(grep -oE 'Fleet dead: [0-9]+' "$LOG" | awk '{s+=$3} END {print s+0}')"
            } > "$DIGEST"
            : > "$LOG"
            echo "📊 Rotated $LOG → $DIGEST"
          fi
          git config user.name "tri-gardener-bot"
          git config user.email "admin@t27.ai"
          git add docs/gardener-experience/ || true
          git diff --cached --quiet || git commit -m "gardener: tick $DT (measured=${{ steps.todo.outputs.measured }}/240, dead=${{ steps.fleet.outputs.fleet_dead }})" || true
          git push origin HEAD:main || echo "push skipped (no changes / protected)"

      - uses: actions/upload-artifact@v4
        with:
          name: gardener-tick-${{ github.run_id }}
          path: /tmp/gardener/
