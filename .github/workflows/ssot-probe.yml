name: SSOT-PROBE — read recent BPB rows
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-24.04
    env:
      RAILWAY_POSTGRES_URL: ${{ secrets.RAILWAY_POSTGRES_URL }}
    steps:
      - name: debug env
        run: |
          echo "RAILWAY_POSTGRES_URL length: ${#RAILWAY_POSTGRES_URL}"
          echo "starts with postgres? $(echo $RAILWAY_POSTGRES_URL | head -c10 | sed 's/[:0-9].*//')"
          which psql
          psql --version
      - name: introspect schema
        run: |
          set -e
          echo "::group::columns of ssot.bpb_samples"
          psql "$RAILWAY_POSTGRES_URL" -c "SELECT column_name, data_type FROM information_schema.columns WHERE table_schema='ssot' AND table_name='bpb_samples' ORDER BY ordinal_position;"
          echo "::endgroup::"
          echo "::group::sample row (any)"
          psql "$RAILWAY_POSTGRES_URL" -c "SELECT * FROM ssot.bpb_samples LIMIT 1;"
          echo "::endgroup::"
