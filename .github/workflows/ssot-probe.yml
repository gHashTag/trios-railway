name: SSOT-PROBE — read recent BPB rows
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-24.04
    env:
      RAILWAY_POSTGRES_URL: ${{ secrets.RAILWAY_POSTGRES_URL }}
    steps:
      - name: debug env
        run: |
          echo "RAILWAY_POSTGRES_URL length: ${#RAILWAY_POSTGRES_URL}"
          echo "starts with postgres? $(echo $RAILWAY_POSTGRES_URL | head -c10 | sed 's/[:0-9].*//')"
          which psql
          psql --version
      - name: probe SSOT
        run: |
          set -e
          echo "::group::TOTAL + last write"
          psql "$RAILWAY_POSTGRES_URL" -c "SELECT count(*) AS total, max(ts) AS last_write FROM ssot.bpb_samples;"
          echo "::endgroup::"
          echo "::group::last 30 min any"
          psql "$RAILWAY_POSTGRES_URL" -c "SELECT canon_name, run_id, step, ROUND(bpb::numeric,4) AS bpb, ts FROM ssot.bpb_samples WHERE ts > NOW() - INTERVAL '30 minutes' ORDER BY ts DESC LIMIT 40;"
          echo "::endgroup::"
          echo "::group::run_id smoke-raise%"
          psql "$RAILWAY_POSTGRES_URL" -c "SELECT canon_name, run_id, step, ROUND(bpb::numeric,4) AS bpb, ts FROM ssot.bpb_samples WHERE run_id LIKE 'smoke-raise%' ORDER BY ts DESC LIMIT 20;"
          echo "::endgroup::"
          echo "::group::scarab-muon last 2h"
          psql "$RAILWAY_POSTGRES_URL" -c "SELECT canon_name, run_id, step, ROUND(bpb::numeric,4) AS bpb, ts FROM ssot.bpb_samples WHERE (canon_name LIKE '%muon%' OR run_id LIKE '%muon%') AND ts > NOW() - INTERVAL '2 hours' ORDER BY ts DESC LIMIT 20;"
          echo "::endgroup::"
