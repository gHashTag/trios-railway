name: L-RAILWAY-TOKEN-PROBE-V3

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enumerate services per project token
        env:
          T1: ${{ secrets.RAILWAY_TOKEN_ACC1 }}
          T2: ${{ secrets.RAILWAY_TOKEN_ACC2 }}
          T3: ${{ secrets.RAILWAY_TOKEN_ACC3 }}
          T4: ${{ secrets.RAILWAY_TOKEN_ACC4 }}
          T5: ${{ secrets.RAILWAY_TOKEN_ACC5 }}
          T6: ${{ secrets.RAILWAY_TOKEN_ACC6 }}
          T7: ${{ secrets.RAILWAY_TOKEN_ACC7 }}
        run: |
          set -e
          TOTAL=0
          for N in 1 2 3 4 5 6 7; do
            VAR="T$N"; TOKEN="${!VAR}"
            RESP=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
              -H "Content-Type: application/json" \
              -H "Project-Access-Token: $TOKEN" \
              -d '{"query":"{ projectToken { project { id name services { edges { node { id name } } } environments { edges { node { id name } } } } } }"}')
            PNAME=$(echo "$RESP" | jq -r '.data.projectToken.project.name // "?"')
            PID=$(echo "$RESP" | jq -r '.data.projectToken.project.id // "?"')
            SVC_COUNT=$(echo "$RESP" | jq -r '.data.projectToken.project.services.edges | length')
            SVC_NAMES=$(echo "$RESP" | jq -r '.data.projectToken.project.services.edges[].node.name' | head -8 | paste -sd ',')
            ENV_NAMES=$(echo "$RESP" | jq -r '.data.projectToken.project.environments.edges[].node.name' | paste -sd ',')
            echo "ACC$N: project=$PNAME (id=$PID) svc_count=$SVC_COUNT names=[$SVC_NAMES] envs=[$ENV_NAMES]"
            TOTAL=$((TOTAL + SVC_COUNT))
          done
          echo "=== FLEET TOTAL: $TOTAL services across 7 project tokens ==="
