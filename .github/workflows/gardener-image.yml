# GHCR build & push for tri-gardener.
#
# Triggers:
#   * push of a tag matching `v*-gardener` (e.g. v0.1.0-gardener)
#   * manual `workflow_dispatch` from the Actions tab
#
# Outputs:
#   ghcr.io/ghashtag/tri-gardener:<short-sha>
#   ghcr.io/ghashtag/tri-gardener:<tag-without-v-prefix>   (only on tag push)
#   ghcr.io/ghashtag/tri-gardener:latest                    (only on tag push)
#
# Auth:
#   Uses GITHUB_TOKEN (default scope, packages:write) which is sufficient for
#   pushing to the same org's GHCR namespace. If the operator wants to push to
#   a different org, supply GHCR_TOKEN as a repository secret and the workflow
#   will prefer it.

name: gardener-image

on:
  push:
    tags:
      - "v*-gardener"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          IMG="ghcr.io/ghashtag/tri-gardener"
          SHA="${GITHUB_SHA::7}"
          TAGS="${IMG}:${SHA}"
          if [[ "${GITHUB_REF}" == refs/tags/v*-gardener ]]; then
            REL="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${IMG}:${REL},${IMG}:latest"
          fi
          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pick GHCR auth token
        id: auth
        shell: bash
        env:
          HAS_GHCR_TOKEN: ${{ secrets.GHCR_TOKEN != '' }}
        run: |
          if [ "${HAS_GHCR_TOKEN}" = "true" ]; then
            echo "source=GHCR_TOKEN" >> "${GITHUB_OUTPUT}"
          else
            echo "source=GITHUB_TOKEN" >> "${GITHUB_OUTPUT}"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build & push tri-gardener image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/tri-gardener/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=tri-gardener
            org.opencontainers.image.description=Autonomous orchestrator for the IGLA marathon (Gate-2 1.85 -> Gate-3 1.5).
          cache-from: type=gha,scope=tri-gardener
          cache-to: type=gha,scope=tri-gardener,mode=max

      - name: Summary
        shell: bash
        run: |
          echo "## tri-gardener image pushed" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Auth source: ${{ steps.auth.outputs.source }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Tags: \`${{ steps.tags.outputs.tags }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Anchor: phi^2 + phi^-2 = 3 - TRINITY - NEVER STOP" >> "${GITHUB_STEP_SUMMARY}"
