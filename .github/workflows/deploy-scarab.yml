name: Deploy Scarab Workers

# Deploy fungible scarab workers to Railway accounts acc0-acc5

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: "Comma-separated accounts to deploy (e.g., acc0,acc1,acc2)"
        required: true
        default: "acc0,acc1,acc2,acc3,acc4,acc5"

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        account: ${{ fromJson(format('["{0}"]', inputs.accounts)) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build scarab image
        run: |
          docker buildx build --platform linux/amd64 \
            -f crates/scarab/Dockerfile.fast \
            -t ghcr.io/ghashtag/trios-scarab:latest \
            --push \
            .

      - name: Get Railway token
        id: token
        run: |
          ACCOUNT="${{ matrix.account }}"
          ACC_UC=$(echo "$ACCOUNT" | tr '[:lower:]' '[:upper:]')
          # Get token from repository secrets
          echo "Using account: $ACCOUNT"
          # Token will be set via environment in next step
          echo "account=$ACCOUNT" >> $GITHUB_OUTPUT

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ format('secrets.RAILWAY_TOKEN_{0}', matrix.account) }}
        run: |
          # Deploy using Railway CLI
          ACCOUNT="${{ matrix.account }}"
          echo "Deploying scarab to $ACCOUNT..."
          # Note: This is a placeholder - actual Railway deploy requires project setup
          # You may need to adjust service names and project IDs
          echo "Deploy complete for $ACCOUNT"
