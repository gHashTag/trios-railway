name: sovereign-scarab

# Publish ghcr.io/<owner>/sovereign-scarab from crates/trios-igla-race
# (Dockerfile.scarab, ADR-0042 SSOT pull-loop runtime). Without this
# workflow the merged ADR-0042 fix in src/bin/scarab.rs never reaches
# Railway: scarab services are deployed from this image tag and there
# was previously no CI path that built it.
#
# Read-only with respect to Railway: this workflow only writes to GHCR;
# it never calls Railway GraphQL push mutations. Triggering a redeploy
# remains an operator action (the scarab control plane is SSOT, not
# Railway API — ADR-0042).
#
# Anchor: phi^2 + phi^-2 = 3.

on:
  push:
    branches:
      - main
    paths:
      - "crates/trios-igla-race/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/sovereign-scarab.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Belt-and-braces: also declare the package-write permission at the job
    # level so a future workflow refactor that drops the top-level block (or
    # narrows it to a different job) doesn't silently break GHCR push.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo owner
        id: owner
        run: |
          echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          OWNER='${{ steps.owner.outputs.value }}'
          IMG="ghcr.io/${OWNER}/sovereign-scarab"
          SHA='${{ github.sha }}'
          SHORT="${SHA:0:7}"
          REF='${{ github.ref_name }}'
          REF_SAFE=$(echo "${REF}" | tr '/' '-')
          {
            echo "image=${IMG}"
            echo "sha=${SHORT}"
            echo "ref=${REF_SAFE}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/trios-igla-race/Dockerfile.scarab
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:v4
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.ref }}
          # Disable buildx provenance/sbom attestations. They write extra
          # OCI artifacts under the same package and trip the GHCR
          # `permission_denied: write_package` check on the first push of a
          # brand-new package, even when `packages: write` is set — because
          # the package is auto-created from the main manifest push but the
          # attestation push races the ACL link. Disabling them lets the
          # first push succeed; subsequent pushes succeed regardless.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
